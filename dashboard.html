<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard — Divine Grace School Portal</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .action-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
    .subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:24px}
    .subject-pill{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-sm);font-size:.86rem;font-weight:500}
    .subject-pill .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex-shrink:0}
  </style>
</head>
<body>
<!-- ══ SVG ICON SPRITE ══ -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none;" aria-hidden="true">
  <symbol id="ic-home" viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></symbol>
  <symbol id="ic-chart" viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></symbol>
  <symbol id="ic-book-open" viewBox="0 0 24 24"><path d="M2 3h7a4 4 0 014 4v14a3 3 0 00-3-3H2V3z"/><path d="M22 3h-7a4 4 0 00-4 4v14a3 3 0 013-3h8V3z"/></symbol>
  <symbol id="ic-book" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></symbol>
  <symbol id="ic-megaphone" viewBox="0 0 24 24"><path d="M18 8a4 4 0 010 8"/><path d="M21 5a7 7 0 010 14"/><path d="M3 9h4l7-5v16l-7-5H3a1 1 0 01-1-1v-4a1 1 0 011-1z"/><line x1="7" y1="9" x2="7" y2="15"/></symbol>
  <symbol id="ic-edit" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></symbol>
  <symbol id="ic-notes" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></symbol>
  <symbol id="ic-users" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></symbol>
  <symbol id="ic-user" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></symbol>
  <symbol id="ic-lock" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></symbol>
  <symbol id="ic-logout" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></symbol>
  <symbol id="ic-plus" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></symbol>
  <symbol id="ic-trash" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></symbol>
  <symbol id="ic-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></symbol>
  <symbol id="ic-calendar" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></symbol>
  <symbol id="ic-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></symbol>
  <symbol id="ic-inbox" viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></symbol>
  <symbol id="ic-print" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></symbol>
  <symbol id="ic-save" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></symbol>
  <symbol id="ic-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></symbol>
  <symbol id="ic-star" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></symbol>
  <symbol id="ic-target" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></symbol>
  <symbol id="ic-message" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></symbol>
  <symbol id="ic-clipboard" viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></symbol>
  <symbol id="ic-chevron-down" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></symbol>
  <symbol id="ic-chevron-up" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></symbol>
  <symbol id="ic-x" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></symbol>
  <symbol id="ic-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></symbol>
</svg>

<div class="app-layout">
  <aside class="sidebar no-print">
    <div class="sidebar__logo">
      <img src="logo.png" alt="Logo" onerror="this.style.display='none'"/>
      <div class="name">Divine Grace School</div>
    </div>
    <nav>
      <a href="dashboard.html" class="active"><span class="icon"><svg class="icon-svg" aria-hidden="true"><use href="#ic-home"/></svg></span> Dashboard</a>
      <a href="results.html"><span class="icon"><svg class="icon-svg" aria-hidden="true"><use href="#ic-chart"/></svg></span> My Results</a>
      <a href="scheme.html"><span class="icon"><svg class="icon-svg" aria-hidden="true"><use href="#ic-book-open"/></svg></span> Scheme of Work</a>
      <a href="announcements.html"><span class="icon"><svg class="icon-svg" aria-hidden="true"><use href="#ic-megaphone"/></svg></span> Announcements</a>
    </nav>
    <div class="sidebar__footer">
      <button class="btn btn-full btn-sm" onclick="logout()" style="color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.2);background:transparent;cursor:pointer;"><svg class="icon-svg" aria-hidden="true"><use href="#ic-logout"/></svg> Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-text">Loading your dashboard...</div>
    </div>

    <!-- Welcome -->
    <div class="welcome-banner" id="welcomeBanner" style="display:none;">
      <h2 id="welcomeName">Welcome!</h2>
      <p>Here is your school portal summary.</p>
      <div class="chips" id="welcomeChips"></div>
    </div>

    <!-- Student Info -->
    <div id="profileSection" style="display:none;margin-bottom:22px;">
      <div class="sec-title"><svg class="icon-svg" aria-hidden="true"><use href="#ic-user"/></svg> My Profile</div>
      <div class="info-grid" id="profileGrid"></div>
    </div>

    <!-- Latest Result Summary -->
    <div id="summarySection" style="display:none;margin-bottom:22px;">
      <div class="sec-title"><svg class="icon-svg" aria-hidden="true"><use href="#ic-chart"/></svg> Latest Result Summary</div>
      <div class="history-selector">
        <div class="form-group">
          <label class="form-label">Session</label>
          <select class="form-control" id="selSession" onchange="loadSummary()"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Class</label>
          <select class="form-control" id="selClass" onchange="loadSummary()"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Term</label>
          <select class="form-control" id="selTerm" onchange="loadSummary()">
            <option>Term 1</option><option>Term 2</option><option>Term 3</option>
          </select>
        </div>
      </div>
      <div class="stats-grid" id="summaryStats" style="margin-bottom:16px;"></div>
    </div>

    <!-- Subjects -->
    <div id="subjectsSection" style="display:none;margin-bottom:22px;">
      <div class="sec-title"><svg class="icon-svg" aria-hidden="true"><use href="#ic-book"/></svg> My Subjects <span id="currentClassLabel" style="font-family:var(--font-b);font-size:.82rem;color:var(--text-muted);font-weight:400;"></span></div>
      <div class="subject-grid" id="subjectGrid"></div>
    </div>

    <!-- Announcements -->
    <div id="announcementsSection" style="display:none;margin-bottom:22px;">
      <div class="sec-title"><svg class="icon-svg" aria-hidden="true"><use href="#ic-megaphone"/></svg> Latest Announcements</div>
      <div id="announcementsList"></div>
    </div>

    <!-- Actions -->
    <div class="action-row no-print" id="actionRow" style="display:none;">
      <a href="results.html" class="btn btn-primary"><svg class="icon-svg" aria-hidden="true"><use href="#ic-chart"/></svg> View Full Results</a>
      <a href="scheme.html" class="btn btn-outline"><svg class="icon-svg" aria-hidden="true"><use href="#ic-book-open"/></svg> Scheme of Work</a>
      <a href="announcements.html" class="btn btn-outline"><svg class="icon-svg" aria-hidden="true"><use href="#ic-megaphone"/></svg> All Announcements</a>
    </div>
  </main>
</div>

<div class="mobile-nav no-print">
  <a href="dashboard.html"><span class="icon"><svg class="icon-svg" aria-hidden="true"><use href="#ic-home"/></svg></span>Home</a>
  <a href="results.html"><span class="icon"><svg class="icon-svg" aria-hidden="true"><use href="#ic-chart"/></svg></span>Results</a>
  <a href="scheme.html"><span class="icon"><svg class="icon-svg" aria-hidden="true"><use href="#ic-book-open"/></svg></span>Scheme</a>
  <a href="announcements.html"><span class="icon"><svg class="icon-svg" aria-hidden="true"><use href="#ic-megaphone"/></svg></span>News</a>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  const studentId = sessionStorage.getItem('studentId');
  if (!studentId) window.location.href = 'index.html';

  let studentData = null;
  let allResults  = [];

  async function init() {
    try {
      const snap = await db.collection('students').doc(studentId).get();
      if (!snap.exists) { logout(); return; }
      studentData = snap.data();

      // Welcome banner
      document.getElementById('welcomeName').textContent = `Welcome, ${studentData.fullName.split(' ')[0]}!`;
      document.getElementById('welcomeChips').innerHTML = `
        <span class="chip">${studentData.currentClass}</span>
        <span class="chip">ID: ${studentId}</span>
        <span class="chip">${studentData.gender}</span>
        <span class="chip">Reg. ${studentData.yearRegistered}</span>
      `;
      document.getElementById('welcomeBanner').style.display = 'block';

      // Profile
      document.getElementById('profileGrid').innerHTML = `
        <div class="info-item"><div class="info-item__label">Full Name</div><div class="info-item__value">${studentData.fullName}</div></div>
        <div class="info-item"><div class="info-item__label">Student ID</div><div class="info-item__value">${studentId}</div></div>
        <div class="info-item"><div class="info-item__label">Current Class</div><div class="info-item__value">${studentData.currentClass}</div></div>
        <div class="info-item"><div class="info-item__label">Gender</div><div class="info-item__value">${studentData.gender}</div></div>
        <div class="info-item"><div class="info-item__label">Age</div><div class="info-item__value">${studentData.age} years</div></div>
        <div class="info-item"><div class="info-item__label">Year Registered</div><div class="info-item__value">${studentData.yearRegistered}</div></div>
      `;
      document.getElementById('profileSection').style.display = 'block';

      // Load all results for dropdown population
      const rSnap = await db.collection('results')
        .where('studentId', '==', studentId)
        .get();
      allResults = rSnap.docs.map(d => d.data());

      // Populate session and class dropdowns from results
      const sessions = [...new Set(allResults.map(r => r.session))].sort().reverse();
      const selSess  = document.getElementById('selSession');
      selSess.innerHTML = sessions.length
        ? sessions.map(s => `<option>${s}</option>`).join('')
        : `<option value="">No results yet</option>`;

      populateClassDropdown();

      document.getElementById('summarySection').style.display = 'block';

      // Current class subjects
      const subjects = getSubjectsForClass(studentData.currentClass);
      document.getElementById('currentClassLabel').textContent = `(${studentData.currentClass})`;
      document.getElementById('subjectGrid').innerHTML = subjects.map(s =>
        `<div class="subject-pill"><span class="dot"></span>${s}</div>`).join('');
      document.getElementById('subjectsSection').style.display = 'block';

      // Load summary
      await loadSummary();

      // Announcements
      await loadAnnouncements();

      document.getElementById('actionRow').style.display = 'flex';
      document.getElementById('loadingOverlay').style.display = 'none';
    } catch(e) {
      console.error(e);
      document.getElementById('loadingOverlay').style.display = 'none';
    }
  }

  function populateClassDropdown() {
    const sess = document.getElementById('selSession').value;
    const classes = [...new Set(allResults.filter(r => r.session===sess).map(r => r.className))].sort();
    const selCls = document.getElementById('selClass');
    selCls.innerHTML = classes.length
      ? classes.map(c => `<option>${c}</option>`).join('')
      : `<option value="">—</option>`;
  }

  async function loadSummary() {
    populateClassDropdown();
    const sess  = document.getElementById('selSession').value;
    const cls   = document.getElementById('selClass').value;
    const term  = document.getElementById('selTerm').value;
    const container = document.getElementById('summaryStats');

    const result = allResults.find(r => r.session===sess && r.className===cls && r.term===term);

    if (!result) {
      container.innerHTML = `<div class="stat-card" style="grid-column:1/-1;"><div class="stat-card__value" style="font-size:1rem;color:var(--text-muted);">No results for this selection.</div></div>`;
      return;
    }

    const isLower = isNurseryOrLowerPrimary(cls);
    if (isLower) {
      container.innerHTML = `
        <div class="stat-card"><div class="stat-card__value">${result.daysAttended||'—'}</div><div class="stat-card__label">Days Attended</div></div>
        <div class="stat-card stat-card--accent"><div class="stat-card__value">${result.daysAbsent||'—'}</div><div class="stat-card__label">Days Absent</div></div>
        <div class="stat-card"><div class="stat-card__value">${starHTML(result.conductRating||0)}</div><div class="stat-card__label">Conduct</div></div>
      `;
    } else {
      container.innerHTML = `
        <div class="stat-card"><div class="stat-card__value">${result.average||'—'}%</div><div class="stat-card__label">Average</div></div>
        <div class="stat-card stat-card--accent"><div class="stat-card__value">${result.overallPosition?'#'+result.overallPosition:'—'}</div><div class="stat-card__label">Position</div></div>
        <div class="stat-card"><div class="stat-card__value">${result.classAverage||'—'}%</div><div class="stat-card__label">Class Avg</div></div>
        <div class="stat-card stat-card--success"><div class="stat-card__value">${result.passFail||'—'}</div><div class="stat-card__label">Status</div></div>
      `;
    }
  }

  async function loadAnnouncements() {
    try {
      const snap = await db.collection('announcements').orderBy('date','desc').limit(3).get();
      if (snap.empty) return;
      const list = document.getElementById('announcementsList');
      list.innerHTML = snap.docs.map(d => {
        const a = d.data();
        const date = a.date?.toDate ? a.date.toDate().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '';
        return `<div class="ann-card"><div class="ann-card__title">${a.title}</div><div class="ann-card__date">${date}</div><div class="ann-card__body">${a.body}</div></div>`;
      }).join('');
      document.getElementById('announcementsSection').style.display = 'block';
    } catch(e) {}
  }

  function logout() { sessionStorage.clear(); window.location.href='index.html'; }

  init();
</script>
</body>
</html>
