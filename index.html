<div class="login-page">
  <!-- Left -->
  <div class="login-left">
    <img src="logo.png" alt="Divine Grace School Logo" onerror="this.style.display='none'"/>
    <h1>Divine Grace School</h1>
    <p>Outstanding Knowledge</p>
    <div style="margin-top:32px;opacity:.45;font-size:.8rem;">Student &amp; Staff Portal</div>
  </div>

  <!-- Right -->
  <div class="login-right">
    <div class="login-box">
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to access your portal</p>

      <div class="login-toggle">
        <button class="active" id="btnStudent" onclick="switchType('student')"><svg class="icon-svg" aria-hidden="true"><use href="#ic-user"/></svg> Student</button>
        <button id="btnAdmin" onclick="switchType('admin')"><svg class="icon-svg" aria-hidden="true"><use href="#ic-lock"/></svg> Admin</button>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <!-- Student -->
      <div id="studentForm">
        <div class="form-group">
          <label class="form-label">Student ID</label>
          <input type="text" class="form-control" id="studentId" placeholder="e.g. DGS-001-2026"/>
        </div>
        <div class="form-group">
          <label class="form-label">PIN</label>
          <input type="password" class="form-control" id="studentPin" placeholder="4-digit PIN" maxlength="4"/>
        </div>
        <button class="btn btn-primary btn-full btn-lg" onclick="studentLogin()">Sign In</button>
      </div>

      <!-- Admin -->
      <div id="adminForm" style="display:none;">
        <div class="form-group">
          <label class="form-label">Admin Email</label>
          <input type="email" class="form-control" id="adminEmail" placeholder="admin@divinegrace.edu.ng"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="adminPass" placeholder="Enter password"/>
        </div>
        <button class="btn btn-primary btn-full btn-lg" onclick="adminLogin()">Admin Sign In</button>
      </div>

      <div style="margin-top:20px;text-align:center;font-size:.78rem;color:var(--text-muted);">
        © 2024 Divine Grace School
      </div>
    </div>
  </div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay" style="display:none;">
  <div class="spinner"></div>
  <div class="loading-text">Signing you in...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  function switchType(t) {
    document.getElementById('studentForm').style.display = t==='student'?'block':'none';
    document.getElementById('adminForm').style.display   = t==='admin'?'block':'none';
    document.getElementById('btnStudent').classList.toggle('active', t==='student');
    document.getElementById('btnAdmin').classList.toggle('active', t==='admin');
    hideError();
  }
  function showError(m){const e=document.getElementById('errorMsg');e.textContent=m;e.classList.add('show')}
  function hideError(){document.getElementById('errorMsg').classList.remove('show')}

  async function studentLogin() {
    hideError();
    const id  = document.getElementById('studentId').value.trim().toUpperCase();
    const pin = document.getElementById('studentPin').value.trim();
    if (!id||!pin) return showError('Enter your Student ID and PIN.');
    document.getElementById('loadingOverlay').style.display='flex';
    try {
      const snap = await db.collection('students').doc(id).get();
      if (!snap.exists) { document.getElementById('loadingOverlay').style.display='none'; return showError('Student ID not found.'); }
      const data = snap.data();
      if (data.pin !== pin) { document.getElementById('loadingOverlay').style.display='none'; return showError('Incorrect PIN. Please try again.'); }
      sessionStorage.setItem('studentId', id);
      sessionStorage.setItem('studentName', data.fullName);
      window.location.href = 'dashboard.html';
    } catch(e) {
      document.getElementById('loadingOverlay').style.display='none';
      showError('Connection error. Try again.');
      console.error(e);
    }
  }

  async function adminLogin() {
    hideError();
    const email = document.getElementById('adminEmail').value.trim();
    const pass  = document.getElementById('adminPass').value.trim();
    if (!email||!pass) return showError('Enter email and password.');
    document.getElementById('loadingOverlay').style.display='flex';
    try {
      await auth.signInWithEmailAndPassword(email, pass);
      sessionStorage.setItem('adminLoggedIn','true');
      window.location.href = 'admin.html';
    } catch(e) {
      document.getElementById('loadingOverlay').style.display='none';
      showError(e.code==='auth/wrong-password'?'Incorrect password.':
                e.code==='auth/user-not-found'?'Admin account not found.':
                'Login failed. Check credentials.');
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key!=='Enter') return;
    document.getElementById('adminForm').style.display!=='none' ? adminLogin() : studentLogin();
  });

  if (sessionStorage.getItem('studentId')) window.location.href='dashboard.html';
  auth.onAuthStateChanged(u => { if(u && sessionStorage.getItem('adminLoggedIn')) window.location.href='admin.html'; });
</script>
</body>
</html>
