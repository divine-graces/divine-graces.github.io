<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scheme of Work — Divine Grace School Portal</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .scheme-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 16px; overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .scheme-card__header {
      background: linear-gradient(135deg, var(--primary) 0%, #1d4870 100%);
      color: #fff; padding: 16px 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
    }
    .scheme-card__header h3 { color: #fff; font-size: 1rem; }
    .scheme-card__body { padding: 0; max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .scheme-card__body.open { max-height: 2000px; }
    .scheme-term {
      padding: 16px 22px; border-bottom: 1px solid var(--border);
    }
    .scheme-term:last-child { border-bottom: none; }
    .scheme-term h4 {
      font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--accent); font-weight: 700; margin-bottom: 10px;
    }
    .topic-list { list-style: none; }
    .topic-list li {
      padding: 6px 0; border-bottom: 1px dashed var(--border);
      font-size: 0.88rem; display: flex; align-items: flex-start; gap: 8px;
    }
    .topic-list li:last-child { border-bottom: none; }
    .topic-list li::before { content: '→'; color: var(--accent); flex-shrink: 0; }
    .no-scheme {
      text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.9rem;
    }
  </style>
</head>

    <nav>
      <a href="dashboard.html"><span class="icon"><svg class="icon-svg" aria-hidden="true"><use href="#ic-home"/></svg></span> Dashboard</a>
      <a href="results.html"><span class="icon"><svg class="icon-svg" aria-hidden="true"><use href="#ic-chart"/></svg></span> My Results</a>
      <a href="scheme.html" class="active"><span class="icon"><svg class="icon-svg" aria-hidden="true"><use href="#ic-book-open"/></svg></span> Scheme of Work</a>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  const studentId = sessionStorage.getItem('studentId');
  if (!studentId) window.location.href = 'index.html';

  async function loadScheme() {
    try {
      const studentSnap = await db.collection('students').doc(studentId).get();
      if (!studentSnap.exists) { logout(); return; }
      const student = studentSnap.data();
      const className = student.currentClass;

      document.getElementById('schemeSubtitle').textContent =
        `${className} — Topics covered across all three terms`;

      const subjects = await getSubjectsForClass(className);

      // Try to load scheme from Firestore
      const schemeSnap = await db.collection('schemes')
        .where('className', '==', className).get();

      const schemeMap = {};
      schemeSnap.forEach(doc => {
        const d = doc.data();
        if (!schemeMap[d.subject]) schemeMap[d.subject] = {};
        schemeMap[d.subject][d.term] = d.topics || [];
      });

      const container = document.getElementById('schemeContent');

      if (Object.keys(schemeMap).length === 0) {
        container.innerHTML = `
          <div class="card">
            <div class="card-body no-scheme">
              <div style="font-size:3rem;margin-bottom:12px;"><svg class="icon-svg" aria-hidden="true"><use href="#ic-inbox"/></svg></div>
              <h3>Scheme Not Available</h3>
              <p>The scheme of work for your class has not been uploaded yet.<br>Please check back later or contact your teacher.</p>
            </div>
          </div>`;
        document.getElementById('loadingOverlay').style.display = 'none';
        return;
      }

      container.innerHTML = subjects.map((subject, i) => {
        const terms = schemeMap[subject] || {};
        const termRows = ['Term 1','Term 2','Term 3'].map(term => {
          const topics = terms[term] || [];
          if (!topics.length) return '';
          return `
            <div class="scheme-term">
              <h4>${term}</h4>
              <ul class="topic-list">
                ${topics.map(t => `<li>${t}</li>`).join('')}
              </ul>
            </div>
          `;
        }).join('');

        return `
          <div class="scheme-card">
            <div class="scheme-card__header" onclick="toggleScheme(${i})">
              <h3><svg class="icon-svg" aria-hidden="true"><use href="#ic-book"/></svg> ${subject}</h3>
              <span id="toggle-${i}"><svg class="icon-svg" aria-hidden="true"><use href="#ic-chevron-down"/></svg></span>
            </div>
            <div class="scheme-card__body ${i===0?'open':''}" id="body-${i}">
              ${termRows || '<div class="no-scheme">No topics uploaded yet.</div>'}
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('loadingOverlay').style.display = 'none';
    } catch(e) {
      console.error(e);
      document.getElementById('loadingOverlay').style.display = 'none';
    }
  }

  function toggleScheme(i) {
    const body = document.getElementById(`body-${i}`);
    const icon = document.getElementById(`toggle-${i}`);
    body.classList.toggle('open');
    icon.innerHTML = body.classList.contains('open') ? '<svg class="icon-svg" aria-hidden="true"><use href="#ic-chevron-up"/></svg>' : '<svg class="icon-svg" aria-hidden="true"><use href="#ic-chevron-down"/></svg>';
  }

  function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

  loadScheme();
</script>
