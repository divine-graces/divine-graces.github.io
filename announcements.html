<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Announcements — Divine Grace School Portal</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .ann-full {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 24px 28px;
      margin-bottom: 16px; box-shadow: var(--shadow-sm);
      border-left: 5px solid var(--accent);
    }
    .ann-full__meta {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 10px; flex-wrap: wrap;
    }
    .ann-full__title { font-family: var(--font-display); font-size: 1.1rem; color: var(--primary); }
    .ann-full__date { font-size: 0.8rem; color: var(--text-muted); }
    .ann-full__tag {
      font-size: 0.75rem; font-weight: 700; padding: 2px 10px;
      border-radius: 12px; background: var(--primary); color: #fff; text-transform: uppercase;
    }
    .ann-full__body { font-size: 0.92rem; line-height: 1.7; color: var(--text); }
    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 3.5rem; margin-bottom: 12px; }
  </style>
</head>

      <a href="results.html"><span class="icon"><svg class="icon-svg" aria-hidden="true"><use href="#ic-chart"/></svg></span> My Results</a>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  const studentId = sessionStorage.getItem('studentId');
  if (!studentId) window.location.href = 'index.html';

  async function loadAnnouncements() {
    try {
      const snap = await db.collection('announcements').orderBy('date', 'desc').get();
      const container = document.getElementById('announcementsContent');
      document.getElementById('loadingOverlay').style.display = 'none';

      if (snap.empty) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon"><svg class="icon-svg" aria-hidden="true"><use href="#ic-inbox"/></svg></div>
            <h3>No Announcements</h3>
            <p>There are no announcements at this time.</p>
          </div>`;
        return;
      }

      container.innerHTML = snap.docs.map(doc => {
        const a = doc.data();
        const date = a.date?.toDate
          ? a.date.toDate().toLocaleDateString('en-GB', {weekday:'long',day:'numeric',month:'long',year:'numeric'})
          : 'Recently';
        return `
          <div class="ann-full">
            <div class="ann-full__meta">
              <span class="ann-full__title">${a.title}</span>
              ${a.tag ? `<span class="ann-full__tag">${a.tag}</span>` : ''}
              <span class="ann-full__date"><svg class="icon-svg" aria-hidden="true"><use href="#ic-calendar"/></svg> ${date}</span>
            </div>
            <div class="ann-full__body">${a.body}</div>
          </div>
        `;
      }).join('');
    } catch(e) {
      document.getElementById('loadingOverlay').style.display = 'none';
      console.error(e);
    }
  }

  function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

  loadAnnouncements();
</script>
